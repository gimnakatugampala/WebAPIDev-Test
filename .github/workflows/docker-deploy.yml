name: Build and Deploy Docker Container

on:
  push:
    branches:
      - dev/basic-apis
  workflow_dispatch:

env:
  # Replace with your actual ACR login server (e.g., yourregistry.azurecr.io)
  REGISTRY_NAME: 'webapidevtestregistry.azurecr.io' 
  # Replace with the exact name of your new Container Web App in Azure
  APP_NAME: 'web-api-dev-test' 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.REGISTRY_NAME }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build . -t ${{ env.REGISTRY_NAME }}/express-api:${{ github.sha }}
          docker push ${{ env.REGISTRY_NAME }}/express-api:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      id-token: write 
      contents: read 

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B989AF9C7AD44B57AA512CFFBE19A44A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_5157E654D19649168580284E4B8D9505 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C1EB100B69654D22898A804B6F1AC665 }}

      - name: Deploy Container to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          images: '${{ env.REGISTRY_NAME }}/express-api:${{ github.sha }}'