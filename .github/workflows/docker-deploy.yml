name: Build and Deploy Docker Container

on:
  push:
    branches:
      - dev/basic-apis
  workflow_dispatch:

env:
  # Replace with your actual ACR login server (e.g., yourregistry.azurecr.io)
  REGISTRY_NAME: 'webapidevtestregistry.azurecr.io' 
  # Replace with the exact name of your new Container Web App in Azure
  APP_NAME: 'webapi-sandbox' 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.REGISTRY_NAME }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build . -t ${{ env.REGISTRY_NAME }}/express-api:${{ github.sha }}
          docker push ${{ env.REGISTRY_NAME }}/express-api:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      id-token: write 
      contents: read 

    steps:
     
      - name: Deploy Container to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          # Use the publish profile instead of the OIDC login
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: '${{ env.REGISTRY_NAME }}/express-api:${{ github.sha }}'